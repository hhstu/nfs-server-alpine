name: image


on:
  push:
    tags:
      - '*'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Build the Docker image
        run: |
          docker buildx create --use
          docker login --username=${{ secrets.DOCKER_USERNAME }} --password=${{ secrets.DOCKER_PASSWORD }} 
          docker  buildx build -t basefly/nfs-server:${{ github.ref_name }} . --platform=linux/arm64,linux/amd64   --push
          docker buildx build -t basefly/nfs-server . --platform=linux/arm64,linux/amd64   --push